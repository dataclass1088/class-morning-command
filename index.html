<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Sarabun',sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0e3d3a}
.box{background:#fff;border-radius:18px;padding:40px 44px;max-width:420px;width:92%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.35)}
.logo{width:64px;height:64px;border:2.5px solid #b9974a;border-radius:50%;margin:0 auto 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#b9974a;font-weight:700;font-size:15px;line-height:1}
.logo small{font-size:7px;letter-spacing:2px;margin-top:2px}
h1{font-size:19px;color:#0e3d3a;margin-bottom:4px}
p{font-size:13px;color:#697875;margin-bottom:20px}
input{width:100%;padding:12px 14px;border:1.5px solid #d8dedc;border-radius:10px;font-size:15px;text-align:center;letter-spacing:2px}
input:focus{outline:none;border-color:#b9974a}
button{width:100%;margin-top:12px;padding:12px;background:#0e3d3a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
button:hover{background:#16605b}
.err{color:#c0392b;font-size:12.5px;margin-top:10px;min-height:18px}
.foot{margin-top:18px;font-size:11px;color:#9aa8a5}
</style>

    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);

    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(ENC.iv)},key,b2a(ENC.ct));
    const html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(e){err.textContent='รหัสผ่านไม่ถูกต้อง ลองใหม่อีกครั้ง';}
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
</script>
